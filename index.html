<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランダムポケモン</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }

    #pokemon-container {
      margin-bottom: 30px;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .pokemon-image {
      width: 200px;
      height: 200px;
      margin-bottom: 20px;
    }

    .pokemon-info {
      margin-bottom: 20px;
    }

    .pokemon-name {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
      text-transform: capitalize;
      margin-bottom: 10px;
    }

    .pokemon-id {
      color: #999;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .pokemon-type {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .type-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      color: white;
      text-transform: uppercase;
    }

    .type-normal { background-color: #A8A878; }
    .type-fighting { background-color: #C03028; }
    .type-flying { background-color: #A890F0; }
    .type-poison { background-color: #A040A0; }
    .type-ground { background-color: #E0C068; }
    .type-rock { background-color: #B8A038; }
    .type-bug { background-color: #A8B820; }
    .type-ghost { background-color: #705898; }
    .type-steel { background-color: #B8B8D0; }
    .type-fire { background-color: #F08030; }
    .type-water { background-color: #6890F0; }
    .type-grass { background-color: #78C850; }
    .type-electric { background-color: #F8D030; color: #333; }
    .type-psychic { background-color: #F85888; }
    .type-ice { background-color: #98D8D8; color: #333; }
    .type-dragon { background-color: #7038F8; }
    .type-dark { background-color: #705848; }
    .type-fairy { background-color: #EE99AC; }

    .pokemon-stats {
      text-align: left;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      color: #666;
    }

    .stat-label {
      font-weight: bold;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    button:active {
      transform: translateY(0);
    }

    .loading {
      display: none;
      font-size: 18px;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 ランダムポケモン</h1>

    <div id="pokemon-container">
      <p style="color: #999; font-size: 16px;">ボタンをクリックしてポケモンを探す</p>
    </div>

    <button onclick="fetchRandomPokemon()">ランダム表示</button>
  </div>

  <script>
    async function fetchRandomPokemon() {
      const container = document.getElementById('pokemon-container');
      const button = document.querySelector('button');

      button.disabled = true;
      container.innerHTML = '<div class="loading">ポケモンを探索中...</div>';

      try {
        const randomId = Math.floor(Math.random() * 898) + 1;
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);

        if (!response.ok) throw new Error('Failed to fetch');

        const data = await response.json();

        const types = data.types
          .map(t => `<span class="type-badge type-${t.type.name}">${t.type.name}</span>`)
          .join('');

        const stats = data.stats
          .map(s => `<div class="stat-row"><span class="stat-label">${s.stat.name}</span><span>${s.base_stat}</span></div>`)
          .join('');

        const imageUrl = data.sprites.other['official-artwork'].front_default ||
                        data.sprites.front_default;

        container.innerHTML = `
          <div class="pokemon-info">
            <img src="${imageUrl}" alt="${data.name}" class="pokemon-image">
            <div class="pokemon-name">${data.name}</div>
            <div class="pokemon-id">#${String(data.id).padStart(3, '0')}</div>
            <div class="pokemon-type">${types}</div>
          </div>
          <div class="pokemon-stats">${stats}</div>
        `;
      } catch (error) {
        container.innerHTML = `<p style="color: red;">エラーが発生しました: ${error.message}</p>`;
      } finally {
        button.disabled = false;
      }
    }

    fetchRandomPokemon();
  </script>
</body>
</html>
